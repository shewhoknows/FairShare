<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="544" height="286" viewBox="0 0 544 286" role="img" aria-labelledby="title desc" >
  <title id="title">Final stamp</title>
  <desc id="desc">A tilted cream and dark ink FINAL stamp matching the BillBandit receipt style.</desc>
  <rect width="544" height="286" fill="#f8f1df"/>
  <g transform="translate(42 86) rotate(-6 230 55)">
    <rect x="0" y="0" width="456" height="110" rx="18" fill="#fff8e8" stroke="#eef1ea" stroke-width="16" opacity="0.95"/>
    <rect x="0" y="0" width="456" height="110" rx="18" fill="none" stroke="#0b1630" stroke-width="8"/>
    <g id="final-letter-shapes" fill="#0b1630" transform="translate(80 29)">
      <g id="letter-f">
        <rect x="0" y="0" width="14" height="58" rx="1"/>
        <rect x="0" y="0" width="47" height="12" rx="1"/>
        <rect x="0" y="24" width="38" height="11" rx="1"/>
        <rect x="-8" y="-1" width="22" height="9" rx="1"/>
        <rect x="-6" y="49" width="26" height="9" rx="1"/>
      </g>
      <g id="letter-i" transform="translate(71 0)">
        <rect x="0" y="0" width="43" height="12" rx="1"/>
        <rect x="0" y="46" width="43" height="12" rx="1"/>
        <rect x="15" y="0" width="13" height="58" rx="1"/>
      </g>
      <g id="letter-n" transform="translate(140 0)">
        <rect x="0" y="0" width="13" height="58" rx="1"/>
        <rect x="43" y="0" width="13" height="58" rx="1"/>
        <polygon points="10,0 24,0 49,58 35,58"/>
      </g>
      <g id="letter-a" transform="translate(219 0)">
        <polygon points="20,0 34,0 57,58 43,58 39,45 14,45 10,58 -4,58"/>
        <rect x="18" y="31" width="18" height="10" rx="1" fill="#f8f1df"/>
        <polygon points="26,14 35,35 17,35"/>
      </g>
      <g id="letter-l" transform="translate(300 0)">
        <rect x="0" y="0" width="14" height="58" rx="1"/>
        <rect x="0" y="46" width="46" height="12" rx="1"/>
        <rect x="-7" y="-1" width="23" height="9" rx="1"/>
      </g>
    </g>
    <path d="M 42 25 L 416 24" stroke="#fffaf0" stroke-width="3" opacity="0.38"/>
    <path d="M 42 84 L 416 83" stroke="#d9d2c4" stroke-width="3" opacity="0.22"/>
  </g>
