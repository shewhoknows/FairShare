name: E2E Tests

on:
  workflow_run:
    workflows: ["Deploy to Railway"]
    types: [completed]
    branches: [main]

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Wait for Railway deployment to be live
        run: |
          echo "Polling health endpoint..."
          for i in $(seq 1 30); do
            status=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.TEST_URL }}/api/health")
            if [ "$status" = "200" ]; then
              echo "✅ App is live (attempt $i)"
              exit 0
            fi
            echo "Attempt $i: HTTP $status — retrying in 10s"
            sleep 10
          done
          echo "❌ App did not become healthy within 5 minutes"
          exit 1

      - name: Run E2E tests
        env:
          TEST_URL: ${{ secrets.TEST_URL }}
        run: npm run test:e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload test videos (on failure)
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-videos
          path: test-results/
          retention-days: 3
