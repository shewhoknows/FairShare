name: Deploy to Railway

env:
  PRODUCTION_URL: https://billbandit-api.contenthelper.in

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')

    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Write deploy metadata
        run: node .github/scripts/write-deploy-info.js

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_SERVICE_ID: ${{ secrets.RAILWAY_SERVICE_ID }}
          RAILWAY_ENVIRONMENT: ${{ secrets.RAILWAY_ENVIRONMENT || 'production' }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
        run: |
          args=(--service "$RAILWAY_SERVICE_ID" --environment "$RAILWAY_ENVIRONMENT" --ci)
          if [ -n "$RAILWAY_PROJECT_ID" ]; then
            args+=(--project "$RAILWAY_PROJECT_ID")
          fi
          railway up "${args[@]}"

      - name: Verify production is serving this commit
        env:
          TEST_URL: ${{ env.PRODUCTION_URL }}
          EXPECTED_SHA: ${{ github.sha }}
        run: node .github/scripts/wait-for-deploy.js
